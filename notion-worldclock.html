<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>World Clock</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { background: transparent; }
    :root { --accent: #233850; --accent-text: #fff; --cell-bg: #e5f2fc; --text:#1a1a1a; --subtext:#aaa; --border:#ebebeb; }
    body { font-family:'Inter',sans-serif; background:transparent; display:flex; flex-direction:column; padding:24px 14px 0 14px; overflow:hidden; }
    .header { font-size:12px; font-weight:300; letter-spacing:0.22em; text-transform:uppercase; color:var(--text); text-align:center; margin-bottom:10px; }
    .cities { display:flex; flex-direction:column; gap:4px; }
    .city-row { display:flex; align-items:center; justify-content:space-between; background:var(--cell-bg); border-radius:5px; padding:8px 12px; }
    .city-left { display:flex; flex-direction:column; gap:2px; }
    .city-name { font-size:9px; font-weight:300; letter-spacing:0.18em; text-transform:uppercase; color:var(--subtext); }
    .city-time { font-size:clamp(20px, 8vw, 32px); font-weight:300; color:var(--text); font-variant-numeric:tabular-nums; letter-spacing:-0.5px; line-height:1; }
    .city-right { display:flex; flex-direction:column; align-items:flex-end; gap:2px; }
    .city-day { font-size:9px; font-weight:300; color:var(--accent-text); background:var(--accent); border-radius:3px; padding:1px 5px; letter-spacing:0.05em; }
    .city-date { font-size:9px; font-weight:300; color:var(--subtext); letter-spacing:0.05em; }
    .footer { display:flex; align-items:center; justify-content:center; padding:8px 0 10px; }
    .footer-btn { background:none; border:none; cursor:pointer; font-family:'Inter',sans-serif; color:var(--subtext); padding:6px 12px; border-radius:5px; font-size:11px; letter-spacing:0.05em; transition:color .15s,background .15s; }
    .footer-btn:hover { color:var(--text); background:var(--cell-bg); }
    .popover-wrap { position:relative; }
    .popover { display:none; position:absolute; bottom:calc(100% + 6px); left:50%; transform:translateX(-50%); background:#fff; border:1px solid var(--border); border-radius:8px; padding:10px; box-shadow:0 4px 16px rgba(0,0,0,.08); z-index:100; width:180px; }
    .popover.open { display:block; }
    .popover-label { font-size:9px; font-weight:400; letter-spacing:0.12em; text-transform:uppercase; color:var(--subtext); margin-bottom:8px; }
    .swatch-grid { display:grid; grid-template-columns:repeat(5,1fr); gap:5px; margin-bottom:10px; }
    .swatch { width:20px; height:20px; border-radius:4px; cursor:pointer; border:1.5px solid transparent; transition:transform .12s; }
    .swatch:hover { transform:scale(1.15); }
    .swatch.active { border-color:#666; }
    .popover-divider { height:1px; background:var(--border); margin:8px 0; }
    .city-list-item { display:flex; align-items:center; justify-content:space-between; padding:3px 0; }
    .city-list-name { font-size:10px; font-weight:300; color:var(--text); }
    .city-remove { background:none; border:none; cursor:pointer; color:var(--subtext); font-size:13px; padding:0 2px; transition:color .12s; }
    .city-remove:hover { color:#e05555; }
    .city-add { display:flex; gap:4px; margin-top:6px; }
    .city-select { flex:1; background:var(--cell-bg); border:none; outline:none; border-radius:4px; padding:4px 6px; font-family:'Inter',sans-serif; font-size:10px; font-weight:300; color:var(--text); }
    .city-add-btn { background:var(--accent); border:none; border-radius:4px; padding:4px 8px; font-family:'Inter',sans-serif; font-size:10px; font-weight:300; color:var(--accent-text); cursor:pointer; }
    .opt-btn { flex:1; background:#f5f5f5; border:1.5px solid transparent; border-radius:5px; padding:4px 8px; font-family:'Inter',sans-serif; font-size:11px; font-weight:300; color:#999; cursor:pointer; transition:all 0.12s; }
    .opt-btn:hover { background:#eee; }
    .opt-btn.active { background:#fff; border-color:#ccc; color:#1a1a1a; }
    .opt-row { display:flex; gap:4px; margin-top:4px; }

    .theme-default { --accent: #233850; --accent-text: #fff; --cell-bg: #e5f2fc; }
    .theme-grey { --accent: #383836; --accent-text: #fff; --cell-bg: #f0efed; }
    .theme-brown { --accent: #45362d; --accent-text: #fff; --cell-bg: #f5ede9; }
    .theme-orange { --accent: #53361f; --accent-text: #fff; --cell-bg: #fcebde; }
    .theme-yellow { --accent: #504425; --accent-text: #fff; --cell-bg: #f9f3db; }
    .theme-green { --accent: #263d30; --accent-text: #fff; --cell-bg: #e8f1eb; }
    .theme-blue { --accent: #233850; --accent-text: #fff; --cell-bg: #e5f2fc; }
    .theme-purple { --accent: #3c2d48; --accent-text: #fff; --cell-bg: #f3ebf9; }
    .theme-pink { --accent: #502c29; --accent-text: #fff; --cell-bg: #fce9e7; }
    .theme-red { --accent: #502c29; --accent-text: #fff; --cell-bg: #fce9e7; }
    body.bg-on::before {
      content: '';
      position: fixed;
      inset: 0;
      background: #fff;
      border-radius: 10px;
      z-index: -1;
      pointer-events: none;
    }
    body.border-on { border: 1px solid rgba(55, 53, 47, 0.09); border-radius: 10px; }
    body.dark.bg-on::before { background: #000; }
    body.dark.border-on { border-color: rgba(255, 255, 255, 0.082); }
    body.dark { --text:#e0e0e0; --subtext:#555; --border:#2a2a2a; }
    body.dark .popover { background:#1e1e1e; border-color:#333; }
    body.dark .city-select { color:#e0e0e0; }
    body.dark .swatch.active { border-color:#ccc; }
    body.dark .opt-btn { background:#2a2a2a; color:#666; }
    body.dark .opt-btn:hover { background:#333; }
    body.dark .opt-btn.active { background:#1e1e1e; border-color:#555; color:#e0e0e0; }
    body.dark .popover-divider { background:#333; }

    body.dark .theme-default { --cell-bg: #233850; --accent: #e5f2fc; --accent-text: #233850; }
    body.dark .theme-grey { --cell-bg: #383836; --accent: #f0efed; --accent-text: #383836; }
    body.dark .theme-brown { --cell-bg: #45362d; --accent: #f5ede9; --accent-text: #45362d; }
    body.dark .theme-orange { --cell-bg: #53361f; --accent: #fcebde; --accent-text: #53361f; }
    body.dark .theme-yellow { --cell-bg: #504425; --accent: #f9f3db; --accent-text: #504425; }
    body.dark .theme-green { --cell-bg: #263d30; --accent: #e8f1eb; --accent-text: #263d30; }
    body.dark .theme-blue { --cell-bg: #233850; --accent: #e5f2fc; --accent-text: #233850; }
    body.dark .theme-purple { --cell-bg: #3c2d48; --accent: #f3ebf9; --accent-text: #3c2d48; }
    body.dark .theme-pink { --cell-bg: #502c29; --accent: #fce9e7; --accent-text: #502c29; }
    body.dark .theme-red { --cell-bg: #502c29; --accent: #fce9e7; --accent-text: #502c29; }
  </style>
</head>
<body>
<div id="widget">
  <div class="header">world clock</div>
  <div class="cities" id="cities"></div>
  <div class="footer">
    <div class="popover-wrap">
      <button class="footer-btn" id="menuBtn">···</button>
      <div class="popover" id="popover">
        <div class="popover-label">Color</div>
        <div class="swatch-grid" id="swatchGrid"></div>
        <div class="popover-divider"></div>
        <div class="popover-label">Cities</div>
        <div id="cityListItems"></div>
        <div class="city-add">
          <select class="city-select" id="citySelect"></select>
          <button class="city-add-btn" id="cityAddBtn">+</button>
        </div>
        <div class="popover-divider"></div>
        <div class="popover-label">Mode</div>
        <div class="opt-row"><button class="opt-btn" id="modeLight">light</button><button class="opt-btn" id="modeDark">dark</button></div>
        <div class="popover-divider"></div>
        <div class="popover-label">Background</div>
        <div class="opt-row"><button class="opt-btn" id="bgOff">off</button><button class="opt-btn" id="bgOn">on</button></div>
        <div class="popover-label" style="margin-top:8px">Border</div>
        <div class="opt-row"><button class="opt-btn" id="borderOff">off</button><button class="opt-btn" id="borderOn">on</button></div>
      </div>
    </div>
  </div>
</div>
<script>
  const ALL_CITIES=[
    {name:'New York',tz:'America/New_York'},{name:'Los Angeles',tz:'America/Los_Angeles'},
    {name:'Chicago',tz:'America/Chicago'},{name:'Toronto',tz:'America/Toronto'},
    {name:'São Paulo',tz:'America/Sao_Paulo'},{name:'Mexico City',tz:'America/Mexico_City'},
    {name:'London',tz:'Europe/London'},{name:'Paris',tz:'Europe/Paris'},
    {name:'Berlin',tz:'Europe/Berlin'},{name:'Cairo',tz:'Africa/Cairo'},
    {name:'Nairobi',tz:'Africa/Nairobi'},{name:'Lagos',tz:'Africa/Lagos'},
    {name:'Dubai',tz:'Asia/Dubai'},{name:'Mumbai',tz:'Asia/Kolkata'},
    {name:'Bangkok',tz:'Asia/Bangkok'},{name:'Singapore',tz:'Asia/Singapore'},
    {name:'Hong Kong',tz:'Asia/Hong_Kong'},{name:'Seoul',tz:'Asia/Seoul'},
    {name:'Tokyo',tz:'Asia/Tokyo'},{name:'Sydney',tz:'Australia/Sydney'},
    {name:'Auckland',tz:'Pacific/Auckland'}
  ];
  const THEMES=[{name:'default',color:'#233850'},{name:'grey',color:'#383836'},{name:'brown',color:'#45362d'},{name:'orange',color:'#53361f'},{name:'yellow',color:'#504425'},{name:'green',color:'#263d30'},{name:'blue',color:'#233850'},{name:'purple',color:'#3c2d48'},{name:'pink',color:'#502c29'},{name:'red',color:'#502c29'}];
  const DAYS=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const MONTHS=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

  const widget=document.getElementById('widget'),popover=document.getElementById('popover'),menuBtn=document.getElementById('menuBtn');
  let activeTheme=localStorage.getItem('wc-theme')||'default';
  let cities=JSON.parse(localStorage.getItem('wc-cities')||'null')||[{name:'New York',tz:'America/New_York'},{name:'London',tz:'Europe/London'},{name:'Tokyo',tz:'Asia/Tokyo'}];
  widget.classList.add('theme-'+activeTheme);

  function pad(n){return String(n).padStart(2,'0');}

  function renderCities(){
    const container=document.getElementById('cities');
    const localDate=new Date();
    container.innerHTML='';
    cities.forEach(c=>{
      const now=new Date();
      const fmt=new Intl.DateTimeFormat('en-US',{timeZone:c.tz,hour:'2-digit',minute:'2-digit',hour12:false,day:'numeric'});
      const parts=fmt.formatToParts(now);
      const h=parts.find(p=>p.type==='hour')?.value||'00';
      const m=parts.find(p=>p.type==='minute')?.value||'00';
      const d=parseInt(parts.find(p=>p.type==='day')?.value||'0');
      const localD=localDate.getDate();
      const diff=d-localD;
      const dateFmt=new Intl.DateTimeFormat('en-US',{timeZone:c.tz,weekday:'short',month:'short',day:'numeric'});
      const dateStr=dateFmt.format(now);
      const row=document.createElement('div');
      row.className='city-row';
      row.innerHTML=`
        <div class="city-left">
          <div class="city-name">${c.name}</div>
          <div class="city-time">${h}:${m}</div>
        </div>
        <div class="city-right">
          ${diff!==0?`<div class="city-day">${diff>0?'+'+diff:diff}d</div>`:''}
          <div class="city-date">${dateStr}</div>
        </div>`;
      container.appendChild(row);
    });
  }

  function renderCityList(){
    const el=document.getElementById('cityListItems');
    el.innerHTML='';
    cities.forEach((c,i)=>{
      const row=document.createElement('div');
      row.className='city-list-item';
      row.innerHTML=`<span class="city-list-name">${c.name}</span><button class="city-remove" data-i="${i}">×</button>`;
      row.querySelector('.city-remove').addEventListener('click',()=>{
        if(cities.length<=2)return;
        cities.splice(i,1);
        localStorage.setItem('wc-cities',JSON.stringify(cities));
        renderCities();renderCityList();populateSelect();
      });
      el.appendChild(row);
    });
  }

  function populateSelect(){
    const sel=document.getElementById('citySelect');
    const existing=cities.map(c=>c.tz);
    sel.innerHTML='';
    ALL_CITIES.filter(c=>!existing.includes(c.tz)).forEach(c=>{
      const opt=document.createElement('option');
      opt.value=c.tz;opt.textContent=c.name;
      sel.appendChild(opt);
    });
    document.getElementById('cityAddBtn').disabled=cities.length>=4;
  }

  document.getElementById('cityAddBtn').addEventListener('click',()=>{
    if(cities.length>=4)return;
    const sel=document.getElementById('citySelect');
    const tz=sel.value;
    const name=ALL_CITIES.find(c=>c.tz===tz)?.name||tz;
    cities.push({name,tz});
    localStorage.setItem('wc-cities',JSON.stringify(cities));
    renderCities();renderCityList();populateSelect();
  });

  THEMES.forEach(t=>{
    const dot=document.createElement('div');
    dot.className='swatch'+(t.name===activeTheme?' active':'');
    dot.style.background=t.color;
    dot.addEventListener('click',()=>{
      widget.classList.remove('theme-'+activeTheme);
      activeTheme=t.name;
      widget.classList.add('theme-'+activeTheme);
      localStorage.setItem('wc-theme',activeTheme);
      document.querySelectorAll('.swatch').forEach(s=>s.classList.remove('active'));
      dot.classList.add('active');
      popover.classList.remove('open');
    });
    document.getElementById('swatchGrid').appendChild(dot);
  });

  menuBtn.addEventListener('click',e=>{e.stopPropagation();popover.classList.toggle('open');renderCityList();populateSelect();});
  document.addEventListener('click',()=>popover.classList.remove('open'));
  popover.addEventListener('click',e=>e.stopPropagation());

  let darkOn = localStorage.getItem('wc-dark') === 'on';
  function setDark(on) { darkOn = on; localStorage.setItem('wc-dark', on ? 'on' : 'off'); document.body.classList.toggle('dark', on); document.getElementById('modeLight').classList.toggle('active', !on); document.getElementById('modeDark').classList.toggle('active', on); }
  document.getElementById('modeLight').addEventListener('click', () => setDark(false));
  document.getElementById('modeDark').addEventListener('click', () => setDark(true));
  setDark(darkOn);
  let bgOn=localStorage.getItem('wc-bg')==='on';
  function setBg(on){bgOn=on;localStorage.setItem('wc-bg',on?'on':'off');document.body.classList.toggle('bg-on',on);document.getElementById('bgOff').classList.toggle('active',!on);document.getElementById('bgOn').classList.toggle('active',on);}
  document.getElementById('bgOff').addEventListener('click',()=>setBg(false));
  document.getElementById('bgOn').addEventListener('click',()=>setBg(true));
  setBg(bgOn);
  let borderOn=localStorage.getItem('wc-border')==='on';
  function setBorder(on){borderOn=on;localStorage.setItem('wc-border',on?'on':'off');document.body.classList.toggle('border-on',on);document.getElementById('borderOff').classList.toggle('active',!on);document.getElementById('borderOn').classList.toggle('active',on);}
  document.getElementById('borderOff').addEventListener('click',()=>setBorder(false));
  document.getElementById('borderOn').addEventListener('click',()=>setBorder(true));
  setBorder(borderOn);

  renderCities();
  setInterval(renderCities,1000);
</script>
</body>
</html>
