<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Notepad</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { background: transparent; }
    :root { --accent: #337EA9; --accent-text: #fff; --cell-bg: #e5f2fc; --text:#1a1a1a; --subtext:#bbb; --border:#ebebeb; }
    body { font-family:'Inter',sans-serif; background: #fff;
      border-radius: 10px; display:flex; flex-direction:column; height:100vh; padding:24px 14px 0 14px; overflow:hidden; }
    .header { font-size:12px; font-weight:300; letter-spacing:0.22em; text-transform:uppercase; color:var(--text); text-align:center; margin-bottom:12px; flex-shrink:0; }
    .pad-wrap { flex:1; background:var(--cell-bg); border-radius:6px; display:flex; overflow:hidden; }
    textarea { flex:1; background:transparent; border:none; outline:none; resize:none; font-family:'Inter',sans-serif; font-size:12px; font-weight:300; line-height:1.7; color:var(--text); padding:12px 14px; caret-color:var(--accent-text); }
    textarea::placeholder { color:var(--subtext); font-style:italic; }
    .footer { display:flex; align-items:center; justify-content:space-between; padding:6px 0 10px; flex-shrink:0; }
    .word-count { font-size:9px; font-weight:300; letter-spacing:0.1em; color:var(--subtext); text-transform:uppercase; min-width:40px; }
    .footer-btn { background:none; border:none; cursor:pointer; font-family:'Inter',sans-serif; color:var(--subtext); padding:6px 12px; border-radius:5px; font-size:11px; letter-spacing:0.05em; transition:color .15s,background .15s; }
    .footer-btn:hover { color:var(--text); background:var(--cell-bg); }
    .popover-wrap { position:relative; }
    .popover { display:none; position:absolute; bottom:calc(100% + 6px); left:50%; transform:translateX(-50%); background:#fff; border:1px solid var(--border); border-radius:8px; padding:10px; box-shadow:0 4px 16px rgba(0,0,0,.08); z-index:100; width:148px; }
    .popover.open { display:block; }
    .popover-label { font-size:9px; font-weight:400; letter-spacing:0.12em; text-transform:uppercase; color:var(--subtext); margin-bottom:8px; }
    .swatch-grid { display:grid; grid-template-columns:repeat(5,1fr); gap:5px; margin-bottom:8px; }
    .swatch { width:20px; height:20px; border-radius:4px; cursor:pointer; border:1.5px solid transparent; transition:transform .12s; }
    .swatch:hover { transform:scale(1.15); }
    .swatch.active { border-color:#666; }
    .popover-divider { height:1px; background:var(--border); margin:8px 0; }
    .clear-btn { width:100%; background:none; border:none; font-family:'Inter',sans-serif; font-size:10px; font-weight:300; letter-spacing:0.1em; text-transform:uppercase; color:#e05555; cursor:pointer; padding:4px 0; text-align:left; transition:opacity .15s; }
    .clear-btn:hover { opacity:.7; }
    .opt-btn { flex:1; background:#f5f5f5; border:1.5px solid transparent; border-radius:5px; padding:4px 8px; font-family:'Inter',sans-serif; font-size:11px; font-weight:300; color:#999; cursor:pointer; transition:all 0.12s; }
    .opt-btn:hover { background:#eee; }
    .opt-btn.active { background:#fff; border-color:#ccc; color:#1a1a1a; }
    .opt-row { display:flex; gap:4px; margin-top:4px; }

    .theme-default { --accent: #337EA9; --accent-text: #fff; --cell-bg: #E9F3F7; }
    .theme-grey { --accent: #9B9A97; --accent-text: #1a1a1a; --cell-bg: #F1F1EF; }
    .theme-brown { --accent: #64473A; --accent-text: #fff; --cell-bg: #F3EEEE; }
    .theme-orange { --accent: #D9730D; --accent-text: #fff; --cell-bg: #F8ECDF; }
    .theme-yellow { --accent: #CB912F; --accent-text: #1a1a1a; --cell-bg: #FAF3DD; }
    .theme-green { --accent: #448361; --accent-text: #fff; --cell-bg: #EEF3ED; }
    .theme-blue { --accent: #337EA9; --accent-text: #fff; --cell-bg: #E9F3F7; }
    .theme-purple { --accent: #9065B0; --accent-text: #fff; --cell-bg: #F6F3F8; }
    .theme-pink { --accent: #C14F8A; --accent-text: #fff; --cell-bg: #F9F2F5; }
    .theme-red { --accent: #D44C47; --accent-text: #fff; --cell-bg: #FAECEC; }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      border-radius: 10px;
      z-index: 9999;
      pointer-events: none;

    }
    body.border-on::before { border: 1px solid rgba(55, 53, 47, 0.09); }
    body.dark.border-on::before { border-color: rgba(255, 255, 255, 0.082); }
    body.dark { --text:#e0e0e0; --subtext:#555; --border:#2a2a2a;  background: #000; }
    body.dark .popover { background:#1e1e1e; border-color:#333; }
    body.dark .popover-divider { background:#333; }
    body.dark .swatch.active { border-color:#ccc; }
    body.dark .opt-btn { background:#2a2a2a; color:#666; }
    body.dark .opt-btn:hover { background:#333; }
    body.dark .opt-btn.active { background:#1e1e1e; border-color:#555; color:#e0e0e0; }

    body.dark
    body.dark
    body.dark
    body.dark
    body.dark
    body.dark
    body.dark
    body.dark
    body.dark
    body.dark

    body.dark .theme-default { --cell-bg: #1F282D; }
    body.dark .theme-grey { --cell-bg: #252525; }
    body.dark .theme-brown { --cell-bg: #2E2724; }
    body.dark .theme-orange { --cell-bg: #36291F; }
    body.dark .theme-yellow { --cell-bg: #372E20; }
    body.dark .theme-green { --cell-bg: #242B26; }
    body.dark .theme-blue { --cell-bg: #1F282D; }
    body.dark .theme-purple { --cell-bg: #2A2430; }
    body.dark .theme-pink { --cell-bg: #2E2328; }
    body.dark .theme-red { --cell-bg: #332523; }
  </style>
</head>
<body>
<div id="widget" style="display:flex;flex-direction:column;height:100%;width:100%">
  <div class="header">notes</div>
  <div class="pad-wrap"><textarea id="pad" placeholder="start typing..."></textarea></div>
  <div class="footer">
    <span class="word-count" id="wc">0 words</span>
    <div class="popover-wrap">
      <button class="footer-btn" id="menuBtn">···</button>
      <div class="popover" id="popover">
        <div class="popover-label">Color</div>
        <div class="swatch-grid" id="swatchGrid"></div>
        <div class="popover-divider"></div>
        <div class="popover-label">Mode</div>
        <div class="opt-row"><button class="opt-btn" id="modeLight">light</button><button class="opt-btn" id="modeDark">dark</button><button class="opt-btn" id="modeAuto">auto</button></div>
        <div class="popover-label" style="margin-top:8px">Border</div>
        <div class="opt-row"><button class="opt-btn" id="borderOff">off</button><button class="opt-btn" id="borderOn">on</button></div>
        <div class="popover-divider"></div>
        <button class="clear-btn" id="clearBtn">clear note</button>
      </div>
    </div>
    <div style="width:40px"></div>
  </div>
</div>
<script>
  const THEMES=[{name:'grey',color:'#9B9A97'},{name:'brown',color:'#64473A'},{name:'orange',color:'#D9730D'},{name:'yellow',color:'#CB912F'},{name:'green',color:'#448361'},{name:'blue',color:'#337EA9'},{name:'purple',color:'#9065B0'},{name:'pink',color:'#C14F8A'},{name:'red',color:'#D44C47'}];
  const widget=document.getElementById('widget'),pad=document.getElementById('pad'),popover=document.getElementById('popover'),menuBtn=document.getElementById('menuBtn');
  let activeTheme=localStorage.getItem('np-theme')||'default';
  widget.classList.add('theme-'+activeTheme);
  pad.value=localStorage.getItem('np-note')||'';
  updateWC();
  let saveTimer;
  pad.addEventListener('input',()=>{updateWC();clearTimeout(saveTimer);saveTimer=setTimeout(()=>localStorage.setItem('np-note',pad.value),500);});
  function updateWC(){const w=pad.value.trim()?pad.value.trim().split(/\s+/).length:0;document.getElementById('wc').textContent=w+(w===1?' word':' words');}
  THEMES.forEach(t=>{const dot=document.createElement('div');dot.className='swatch'+(t.name===activeTheme?' active':'');dot.style.background=t.color;dot.addEventListener('click',()=>{widget.classList.remove('theme-'+activeTheme);activeTheme=t.name;widget.classList.add('theme-'+activeTheme);localStorage.setItem('np-theme',activeTheme);document.querySelectorAll('.swatch').forEach(s=>s.classList.remove('active'));dot.classList.add('active');popover.classList.remove('open');});document.getElementById('swatchGrid').appendChild(dot);});
  document.getElementById('clearBtn').addEventListener('click',()=>{if(confirm('Clear your note?')){pad.value='';localStorage.removeItem('np-note');updateWC();popover.classList.remove('open');}});
  menuBtn.addEventListener('click',e=>{e.stopPropagation();popover.classList.toggle('open');});
  document.addEventListener('click',()=>popover.classList.remove('open'));
  popover.addEventListener('click',e=>e.stopPropagation());
  const _mq = window.matchMedia('(prefers-color-scheme: dark)');
  let _mode = localStorage.getItem('np-dark') || 'auto';
  if (_mode === 'on') _mode = 'dark';
  if (_mode === 'off') _mode = 'light';
  function _applyDark(m) {
    document.body.classList.toggle('dark', m === 'dark' || (m === 'auto' && _mq.matches));
  }
  function setMode(m) {
    _mode = m; localStorage.setItem('np-dark', m); _applyDark(m);
    document.getElementById('modeLight').classList.toggle('active', m === 'light');
    document.getElementById('modeDark').classList.toggle('active', m === 'dark');
    document.getElementById('modeAuto').classList.toggle('active', m === 'auto');
  }
  _mq.addEventListener('change', () => { if (_mode === 'auto') _applyDark('auto'); });
  document.getElementById('modeLight').addEventListener('click', () => setMode('light'));
  document.getElementById('modeDark').addEventListener('click', () => setMode('dark'));
  document.getElementById('modeAuto').addEventListener('click', () => setMode('auto'));
  setMode(_mode);
  let borderOn=localStorage.getItem('np-border') !== 'off';
  function setBorder(on){borderOn=on;localStorage.setItem('np-border',on?'on':'off');document.body.classList.toggle('border-on',on);document.getElementById('borderOff').classList.toggle('active',!on);document.getElementById('borderOn').classList.toggle('active',on);}
  document.getElementById('borderOff').addEventListener('click',()=>setBorder(false));
  document.getElementById('borderOn').addEventListener('click',()=>setBorder(true));
  setBorder(borderOn);
</script>
</body>
</html>
