<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calendar Widget</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    /* ── Base tokens ── */
    :root {
      --accent:      #c4dff5;
      --accent-text: #2a6496;
      --cell-bg:     #eef5fb;
      --text:        #1a1a1a;
      --subtext:     #aaa;
      --faint:       #e0e0e0;
      --border:      #ebebeb;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: transparent;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      overflow: hidden;
      padding: 0 14px 0 8px;
    }

    .widget {
      width: min(300px, 95vw);
      user-select: none;
      position: relative;
    }

    /* ── Header ── */
    .header {
      margin-bottom: 10px;
    }

    .month-label {
      font-size: 12px;
      font-weight: 300;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--text);
      text-align: center;
    }

    /* ── Footer ── */
    .footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 8px;
      padding: 4px 10px 10px 10px;
    }

    .widget {
      padding-bottom: 6px;
    }

    .nav-btn, .menu-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--subtext);
      font-size: 13px;
      line-height: 1;
      padding: 3px 5px;
      border-radius: 4px;
      transition: color 0.15s, background 0.15s;
      font-family: 'Inter', sans-serif;
    }

    .nav-btn:hover, .menu-btn:hover {
      color: var(--text);
      background: var(--border);
    }

    .menu-btn {
      font-size: 11px;
      letter-spacing: 0.05em;
      color: var(--subtext);
    }

    /* ── Color popover ── */
    .popover-wrap {
      position: relative;
    }

    .popover {
      display: none;
      position: absolute;
      bottom: calc(100% + 6px);
      left: 50%;
      transform: translateX(-50%);
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.08);
      z-index: 100;
      width: 148px;
    }

    .popover.open { display: block; }

    .popover-label {
      font-size: 9px;
      font-weight: 400;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--subtext);
      margin-bottom: 8px;
    }

    .swatch-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 5px;
    }

    .swatch {
      width: 20px;
      height: 20px;
      border-radius: 4px;
      cursor: pointer;
      border: 1.5px solid transparent;
      transition: transform 0.12s, border-color 0.12s;
    }

    .swatch:hover { transform: scale(1.15); }
    .swatch.active { border-color: #666; }

    /* ── Day labels ── */
    .days-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 2px;
      margin-bottom: 3px;
    }

    .day-label {
      text-align: center;
      font-size: 9px;
      font-weight: 400;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--subtext);
      padding: 2px 0;
    }

    /* ── Date cells ── */
    .dates-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 2px;
    }

    .day-cell {
      aspect-ratio: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      font-weight: 300;
      color: var(--text);
      background: var(--cell-bg);
      border-radius: 4px;
      transition: background 0.1s;
    }

    .day-cell.other-month {
      color: var(--subtext);
      background: transparent;
    }

    .day-cell.today {
      background: var(--accent);
      color: var(--accent-text);
      font-weight: 400;
    }

    /* ── Notion exact background colors (light mode) ── */
    .theme-default {
      --accent:      #b8d4e3;
      --accent-text: #1a4f6e;
      --cell-bg:     #ddebf1;
    }
    .theme-grey {
      --accent:      #c8cacc;
      --accent-text: #3a3a3a;
      --cell-bg:     #ebeced;
    }
    .theme-brown {
      --accent:      #cec8c5;
      --accent-text: #5c3d2e;
      --cell-bg:     #e9e5e3;
    }
    .theme-orange {
      --accent:      #f0ceaa;
      --accent-text: #7a3c08;
      --cell-bg:     #faebdd;
    }
    .theme-yellow {
      --accent:      #eed9a0;
      --accent-text: #6a4e10;
      --cell-bg:     #fbf3db;
    }
    .theme-green {
      --accent:      #aacfc9;
      --accent-text: #1a5248;
      --cell-bg:     #ddedea;
    }
    .theme-blue {
      --accent:      #b8d4e3;
      --accent-text: #1a4f6e;
      --cell-bg:     #ddebf1;
    }
    .theme-purple {
      --accent:      #cfc4e0;
      --accent-text: #42286e;
      --cell-bg:     #eae4f2;
    }
    .theme-pink {
      --accent:      #e4bcce;
      --accent-text: #6e1a46;
      --cell-bg:     #f4dfeb;
    }
    .theme-red {
      --accent:      #f0bcbc;
      --accent-text: #6e1a1a;
      --cell-bg:     #fbe4e4;
    }

    /* ── Dark mode ── */
    @media (prefers-color-scheme: dark) {
      :root {
        --text:    #e0e0e0;
        --subtext: #555;
        --faint:   #333;
        --border:  #2a2a2a;
      }
      .popover {
        background: #1e1e1e;
        border-color: #333;
        box-shadow: 0 4px 16px rgba(0,0,0,0.4);
      }
      .day-cell { background: #1e1e1e; }
      .day-cell.other-month { background: transparent; }
      .theme-default .day-cell { background: #1a2530; }
      .theme-grey    .day-cell { background: #202020; }
      .theme-brown   .day-cell { background: #251c18; }
      .theme-orange  .day-cell { background: #261a0e; }
      .theme-yellow  .day-cell { background: #25200e; }
      .theme-green   .day-cell { background: #0e2220; }
      .theme-blue    .day-cell { background: #0e1c26; }
      .theme-purple  .day-cell { background: #1a1026; }
      .theme-pink    .day-cell { background: #250e1a; }
      .theme-red     .day-cell { background: #250e0e; }
      .swatch.active { border-color: #ccc; }
    }
  </style>
</head>
<body>
<div class="widget" id="widget">

  <div class="header">
    <div class="month-label" id="monthLabel">January 2026</div>
  </div>

  <div class="days-grid">
    <div class="day-label">Su</div>
    <div class="day-label">Mo</div>
    <div class="day-label">Tu</div>
    <div class="day-label">We</div>
    <div class="day-label">Th</div>
    <div class="day-label">Fr</div>
    <div class="day-label">Sa</div>
  </div>

  <div class="dates-grid" id="datesGrid"></div>

  <div class="footer">
    <button class="nav-btn" id="prev">&#171;</button>
    <div class="popover-wrap" id="popoverWrap">
      <button class="menu-btn" id="menuBtn">···</button>
      <div class="popover" id="popover">
        <div class="popover-label">Color</div>
        <div class="swatch-grid" id="swatchGrid"></div>
      </div>
    </div>
    <button class="nav-btn" id="next">&#187;</button>
  </div>

</div>

<script>
  const MONTHS = ['January','February','March','April','May','June',
                  'July','August','September','October','November','December'];

  const THEMES = [
    { name: 'default', color: '#ddebf1', label: 'Default' },
    { name: 'grey',    color: '#ebeced', label: 'Grey'    },
    { name: 'brown',   color: '#e9e5e3', label: 'Brown'   },
    { name: 'orange',  color: '#faebdd', label: 'Orange'  },
    { name: 'yellow',  color: '#fbf3db', label: 'Yellow'  },
    { name: 'green',   color: '#ddedea', label: 'Green'   },
    { name: 'blue',    color: '#ddebf1', label: 'Blue'    },
    { name: 'purple',  color: '#eae4f2', label: 'Purple'  },
    { name: 'pink',    color: '#f4dfeb', label: 'Pink'    },
    { name: 'red',     color: '#fbe4e4', label: 'Red'     },
  ];

  const widget   = document.getElementById('widget');
  const popover  = document.getElementById('popover');
  const menuBtn  = document.getElementById('menuBtn');
  const today    = new Date();
  let current    = { year: today.getFullYear(), month: today.getMonth() };
  let activeTheme = localStorage.getItem('cal-theme') || 'default';
  widget.classList.add(`theme-${activeTheme}`);

  /* ── Popover toggle ── */
  menuBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    popover.classList.toggle('open');
  });

  document.addEventListener('click', () => popover.classList.remove('open'));
  popover.addEventListener('click', (e) => e.stopPropagation());

  /* ── Swatches ── */
  const grid = document.getElementById('swatchGrid');
  THEMES.forEach(t => {
    const dot = document.createElement('div');
    dot.className = 'swatch' + (t.name === activeTheme ? ' active' : '');
    dot.setAttribute('data-theme', t.name);
    dot.style.background = t.color;
    dot.title = t.label;
    dot.addEventListener('click', () => {
      widget.classList.remove(`theme-${activeTheme}`);
      activeTheme = t.name;
      widget.classList.add(`theme-${activeTheme}`);
      localStorage.setItem('cal-theme', activeTheme);
      document.querySelectorAll('.swatch').forEach(s => s.classList.remove('active'));
      dot.classList.add('active');
      popover.classList.remove('open');
    });
    grid.appendChild(dot);
  });

  /* ── Calendar render ── */
  function renderCalendar() {
    const { year, month } = current;
    document.getElementById('monthLabel').textContent = `${MONTHS[month]} ${year}`;

    const dateGrid = document.getElementById('datesGrid');
    dateGrid.innerHTML = '';

    const firstDay     = new Date(year, month, 1).getDay();
    const daysInMonth  = new Date(year, month + 1, 0).getDate();
    const daysInPrev   = new Date(year, month, 0).getDate();

    for (let i = 0; i < firstDay; i++) {
      const cell = document.createElement('div');
      cell.className = 'day-cell other-month';
      cell.textContent = daysInPrev - firstDay + 1 + i;
      dateGrid.appendChild(cell);
    }

    for (let d = 1; d <= daysInMonth; d++) {
      const cell = document.createElement('div');
      const isToday = d === today.getDate() &&
                      month === today.getMonth() &&
                      year === today.getFullYear();
      cell.className = 'day-cell' + (isToday ? ' today' : '');
      cell.textContent = d;
      dateGrid.appendChild(cell);
    }

    const total    = firstDay + daysInMonth;
    const trailing = total % 7 === 0 ? 0 : 7 - (total % 7);
    for (let i = 1; i <= trailing; i++) {
      const cell = document.createElement('div');
      cell.className = 'day-cell other-month';
      cell.textContent = i;
      dateGrid.appendChild(cell);
    }
  }

  document.getElementById('prev').addEventListener('click', () => {
    current.month--;
    if (current.month < 0) { current.month = 11; current.year--; }
    renderCalendar();
  });

  document.getElementById('next').addEventListener('click', () => {
    current.month++;
    if (current.month > 11) { current.month = 0; current.year++; }
    renderCalendar();
  });

  renderCalendar();
</script>
</body>
</html>
