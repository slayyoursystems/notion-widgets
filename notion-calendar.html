<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calendar Widget</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --accent: #2eaadc;
      --accent-light: #e8f4f9;
      --text: #1a1a1a;
      --subtext: #999;
      --faint: #ddd;
      --bg: transparent;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      overflow: hidden;
    }

    .widget {
      width: min(320px, 95vw);
      user-select: none;
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    .month-label {
      font-size: 13px;
      font-weight: 300;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--text);
    }

    .nav {
      display: flex;
      gap: 8px;
    }

    .nav button {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--subtext);
      font-size: 14px;
      line-height: 1;
      padding: 2px 4px;
      border-radius: 3px;
      transition: color 0.15s;
    }

    .nav button:hover { color: var(--text); }

    /* Day labels */
    .days-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 2px;
      margin-bottom: 4px;
    }

    .day-label {
      text-align: center;
      font-size: 9px;
      font-weight: 400;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--subtext);
      padding: 2px 0;
    }

    /* Dates */
    .dates-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 2px;
    }

    .day-cell {
      text-align: center;
      font-size: 11px;
      font-weight: 300;
      color: var(--text);
      padding: 5px 2px;
      border-radius: 4px;
      cursor: default;
      transition: background 0.1s;
      line-height: 1;
    }

    .day-cell.empty { color: transparent; }

    .day-cell.other-month { color: var(--faint); }

    .day-cell.today {
      background: var(--accent);
      color: #fff;
      font-weight: 400;
      border-radius: 50%;
      width: 24px;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: auto;
      padding: 0;
    }

    /* Color swatches */
    .swatches {
      display: flex;
      gap: 5px;
      justify-content: center;
      margin-top: 12px;
    }

    .swatch {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      cursor: pointer;
      border: 1.5px solid transparent;
      transition: transform 0.15s, border-color 0.15s;
    }

    .swatch:hover { transform: scale(1.3); }
    .swatch.active { border-color: var(--text); transform: scale(1.2); }

    /* ── Themes ── */
    /* Default blue */
    .theme-default { --accent: #2eaadc; --accent-light: #e8f4f9; }
    /* Grey */
    .theme-grey    { --accent: #9b9a97; --accent-light: #f1f1ef; }
    /* Brown */
    .theme-brown   { --accent: #64473a; --accent-light: #f3eeee; }
    /* Orange */
    .theme-orange  { --accent: #d9730d; --accent-light: #faebdd; }
    /* Yellow */
    .theme-yellow  { --accent: #cb912f; --accent-light: #fbf3db; }
    /* Green */
    .theme-green   { --accent: #0f7b6c; --accent-light: #ddedea; }
    /* Blue */
    .theme-blue    { --accent: #0b6e99; --accent-light: #ddebf1; }
    /* Purple */
    .theme-purple  { --accent: #6940a5; --accent-light: #eae4f2; }
    /* Pink */
    .theme-pink    { --accent: #ad1a72; --accent-light: #f4dfeb; }
    /* Red */
    .theme-red     { --accent: #e03e3e; --accent-light: #fbe4e4; }

    /* Dark mode */
    @media (prefers-color-scheme: dark) {
      :root {
        --text: #e8e8e8;
        --subtext: #555;
        --faint: #333;
      }
      .day-cell.today { color: #fff; }
      .swatch.active { border-color: #e8e8e8; }
    }
  </style>
</head>
<body>
<div class="widget theme-default" id="widget">
  <div class="header">
    <div class="month-label" id="monthLabel">January 2026</div>
    <div class="nav">
      <button id="prev">&#8592;</button>
      <button id="next">&#8594;</button>
    </div>
  </div>

  <div class="days-grid">
    <div class="day-label">Su</div>
    <div class="day-label">Mo</div>
    <div class="day-label">Tu</div>
    <div class="day-label">We</div>
    <div class="day-label">Th</div>
    <div class="day-label">Fr</div>
    <div class="day-label">Sa</div>
  </div>

  <div class="dates-grid" id="datesGrid"></div>

  <div class="swatches" id="swatches"></div>
</div>

<script>
  const MONTHS = ['January','February','March','April','May','June',
                  'July','August','September','October','November','December'];

  const THEMES = [
    { name: 'default', color: '#2eaadc' },
    { name: 'grey',    color: '#9b9a97' },
    { name: 'brown',   color: '#64473a' },
    { name: 'orange',  color: '#d9730d' },
    { name: 'yellow',  color: '#cb912f' },
    { name: 'green',   color: '#0f7b6c' },
    { name: 'blue',    color: '#0b6e99' },
    { name: 'purple',  color: '#6940a5' },
    { name: 'pink',    color: '#ad1a72' },
    { name: 'red',     color: '#e03e3e' },
  ];

  const widget = document.getElementById('widget');
  const today = new Date();
  let current = { year: today.getFullYear(), month: today.getMonth() };
  let activeTheme = 'default';

  function renderCalendar() {
    const { year, month } = current;
    document.getElementById('monthLabel').textContent = `${MONTHS[month]} ${year}`;

    const grid = document.getElementById('datesGrid');
    grid.innerHTML = '';

    const firstDay = new Date(year, month, 1).getDay();
    const daysInMonth = new Date(year, month + 1, 0).getDate();
    const daysInPrev = new Date(year, month, 0).getDate();

    // Leading empty cells (prev month)
    for (let i = 0; i < firstDay; i++) {
      const cell = document.createElement('div');
      cell.className = 'day-cell other-month';
      cell.textContent = daysInPrev - firstDay + 1 + i;
      grid.appendChild(cell);
    }

    // Current month days
    for (let d = 1; d <= daysInMonth; d++) {
      const cell = document.createElement('div');
      const isToday = d === today.getDate() &&
                      month === today.getMonth() &&
                      year === today.getFullYear();
      cell.className = 'day-cell' + (isToday ? ' today' : '');
      cell.textContent = d;
      grid.appendChild(cell);
    }

    // Trailing cells
    const total = firstDay + daysInMonth;
    const trailing = total % 7 === 0 ? 0 : 7 - (total % 7);
    for (let i = 1; i <= trailing; i++) {
      const cell = document.createElement('div');
      cell.className = 'day-cell other-month';
      cell.textContent = i;
      grid.appendChild(cell);
    }
  }

  function renderSwatches() {
    const container = document.getElementById('swatches');
    container.innerHTML = '';
    THEMES.forEach(t => {
      const dot = document.createElement('div');
      dot.className = 'swatch' + (t.name === activeTheme ? ' active' : '');
      dot.style.background = t.color;
      dot.title = t.name;
      dot.addEventListener('click', () => {
        widget.classList.remove(`theme-${activeTheme}`);
        activeTheme = t.name;
        widget.classList.add(`theme-${activeTheme}`);
        document.querySelectorAll('.swatch').forEach(s => s.classList.remove('active'));
        dot.classList.add('active');
      });
      container.appendChild(dot);
    });
  }

  document.getElementById('prev').addEventListener('click', () => {
    current.month--;
    if (current.month < 0) { current.month = 11; current.year--; }
    renderCalendar();
  });

  document.getElementById('next').addEventListener('click', () => {
    current.month++;
    if (current.month > 11) { current.month = 0; current.year++; }
    renderCalendar();
  });

  renderCalendar();
  renderSwatches();
</script>
</body>
</html>
