<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calendar Widget</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { background: transparent; }

    /* ── Base tokens ── */
    :root {
      --accent: #337EA9;
      --accent-text: #fff;
      --cell-bg: #e5f2fc;
      --text:        #1a1a1a;
      --subtext:     #aaa;
      --faint:       #e0e0e0;
      --border:      #ebebeb;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: #fff;
      border-radius: 10px;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow: hidden;
      padding: 24px 14px 0 8px;  /* ← change first number to adjust top margin */
    }

    .widget {
      width: min(300px, 95vw);
      user-select: none;
      position: relative;
    }

    /* ── Header ── */
    .header {
      margin-bottom: 10px;
    }

    .month-label {
      font-size: 12px;
      font-weight: 300;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--text);
      text-align: center;
    }

    /* ── Footer ── */
    .footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 8px;
      padding: 4px 10px 10px 10px;
    }

    .widget {
      padding-bottom: 6px;
    }

    .nav-btn, .menu-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--subtext);
      font-size: 13px;
      line-height: 1;
      padding: 3px 5px;
      border-radius: 4px;
      transition: color 0.15s, background 0.15s;
      font-family: 'Inter', sans-serif;
    }

    .nav-btn:hover, .menu-btn:hover {
      color: var(--text);
      background: var(--border);
    }

    .menu-btn {
      font-size: 11px;
      letter-spacing: 0.05em;
      color: var(--subtext);
    }

    /* ── Color popover ── */
    .popover-wrap {
      position: relative;
    }

    .popover {
      display: none;
      position: absolute;
      bottom: calc(100% + 6px);
      left: 50%;
      transform: translateX(-50%);
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.08);
      z-index: 100;
      width: 148px;
    }

    .popover.open { display: block; }

    .popover-label {
      font-size: 9px;
      font-weight: 400;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--subtext);
      margin-bottom: 8px;
    }

    .swatch-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 5px;
    }

    .swatch {
      width: 20px;
      height: 20px;
      border-radius: 4px;
      cursor: pointer;
      border: 1.5px solid transparent;
      transition: transform 0.12s, border-color 0.12s;
    }

    .swatch:hover { transform: scale(1.15); }
    .swatch.active { border-color: #666; }

    /* ── Day labels ── */
    .days-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 2px;
      margin-bottom: 3px;
    }

    .day-label {
      text-align: center;
      font-size: 9px;
      font-weight: 400;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--subtext);
      padding: 2px 0;
    }

    /* ── Date cells ── */
    .dates-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 2px;
    }

    .day-cell {
      aspect-ratio: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      font-weight: 300;
      color: var(--text);
      background: var(--cell-bg);
      border-radius: 4px;
      transition: background 0.1s;
    }

    .day-cell.other-month {
      color: var(--subtext);
      background: transparent;
    }

    .day-cell.today {
      background: var(--accent);
      color: var(--accent-text);
      font-weight: 400;
    }

    /* ── Notion exact background colors (light mode) ── */

    .popover-divider { height: 1px; background: var(--border); margin: 8px 0; }
    .opt-row { display: flex; gap: 5px; }
    .opt-btn { flex:1; background:#f5f5f5; border:1.5px solid transparent; border-radius:5px; padding:4px 8px; font-family:'Inter',sans-serif; font-size:11px; font-weight:300; color:#999; cursor:pointer; transition:all 0.12s; }
    .opt-btn:hover { background:#eee; }
    .opt-btn.active { background:#fff; border-color:#ccc; color:#1a1a1a; }

    /* ── Dark mode ── */

    .theme-default { --accent: #337EA9; --accent-text: #fff; --cell-bg: #E9F3F7; }
    .theme-grey { --accent: #9B9A97; --accent-text: #1a1a1a; --cell-bg: #F1F1EF; }
    .theme-brown { --accent: #64473A; --accent-text: #fff; --cell-bg: #F3EEEE; }
    .theme-orange { --accent: #D9730D; --accent-text: #fff; --cell-bg: #F8ECDF; }
    .theme-yellow { --accent: #CB912F; --accent-text: #1a1a1a; --cell-bg: #FAF3DD; }
    .theme-green { --accent: #448361; --accent-text: #fff; --cell-bg: #EEF3ED; }
    .theme-blue { --accent: #337EA9; --accent-text: #fff; --cell-bg: #E9F3F7; }
    .theme-purple { --accent: #9065B0; --accent-text: #fff; --cell-bg: #F6F3F8; }
    .theme-pink { --accent: #C14F8A; --accent-text: #fff; --cell-bg: #F9F2F5; }
    .theme-red { --accent: #D44C47; --accent-text: #fff; --cell-bg: #FAECEC; }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      border-radius: 10px;
      z-index: 9999;
      pointer-events: none;

    }
    body.border-on::before { border: 1px solid rgba(55, 53, 47, 0.09); }
    body.dark.border-on::before { border-color: rgba(255, 255, 255, 0.082); }
    body.dark { --text: #e0e0e0; --subtext: #555; --faint: #333; --border: #2a2a2a;  background: #000; }
    body.dark .popover { background: #1e1e1e; border-color: #333; box-shadow: 0 4px 16px rgba(0,0,0,0.4); }
    body.dark .day-cell.other-month { background: transparent; }
    body.dark .swatch.active { border-color: #ccc; }
    body.dark .opt-btn { background: #2a2a2a; color: #666; }
    body.dark .opt-btn:hover { background: #333; }
    body.dark .opt-btn.active { background: #1e1e1e; border-color: #555; color: #e0e0e0; }

    body.dark
    body.dark
    body.dark
    body.dark
    body.dark
    body.dark
    body.dark
    body.dark
    body.dark
    body.dark

    body.dark .theme-default { --cell-bg: #1F282D; }
    body.dark .theme-grey { --cell-bg: #252525; }
    body.dark .theme-brown { --cell-bg: #2E2724; }
    body.dark .theme-orange { --cell-bg: #36291F; }
    body.dark .theme-yellow { --cell-bg: #372E20; }
    body.dark .theme-green { --cell-bg: #242B26; }
    body.dark .theme-blue { --cell-bg: #1F282D; }
    body.dark .theme-purple { --cell-bg: #2A2430; }
    body.dark .theme-pink { --cell-bg: #2E2328; }
    body.dark .theme-red { --cell-bg: #332523; }
  </style>
</head>
<body>
<div class="widget" id="widget">

  <div class="header">
    <div class="month-label" id="monthLabel">January 2026</div>
  </div>

  <div class="days-grid">
    <div class="day-label">Su</div>
    <div class="day-label">Mo</div>
    <div class="day-label">Tu</div>
    <div class="day-label">We</div>
    <div class="day-label">Th</div>
    <div class="day-label">Fr</div>
    <div class="day-label">Sa</div>
  </div>

  <div class="dates-grid" id="datesGrid"></div>

  <div class="footer">
    <button class="nav-btn" id="prev">&#171;</button>
    <div class="popover-wrap" id="popoverWrap">
      <button class="menu-btn" id="menuBtn">···</button>
      <div class="popover" id="popover">
        <div class="popover-label">Color</div>
        <div class="swatch-grid" id="swatchGrid"></div>
        <div class="popover-divider"></div>
        <div class="popover-label">Mode</div>
        <div class="opt-row"><button class="opt-btn" id="modeLight">light</button><button class="opt-btn" id="modeDark">dark</button><button class="opt-btn" id="modeAuto">auto</button></div>
        <div class="popover-divider"></div>
        <div class="popover-label">Border</div>
        <div class="opt-row">
          <button class="opt-btn" id="borderOff">off</button>
          <button class="opt-btn" id="borderOn">on</button>
        </div>
      </div>
    </div>
    <button class="nav-btn" id="next">&#187;</button>
  </div>

</div>

<script>
  const MONTHS = ['January','February','March','April','May','June',
                  'July','August','September','October','November','December'];

  const THEMES=[{name:'grey',color:'#9B9A97'},{name:'brown',color:'#64473A'},{name:'orange',color:'#D9730D'},{name:'yellow',color:'#CB912F'},{name:'green',color:'#448361'},{name:'blue',color:'#337EA9'},{name:'purple',color:'#9065B0'},{name:'pink',color:'#C14F8A'},{name:'red',color:'#D44C47'}];

  const widget   = document.getElementById('widget');
  const popover  = document.getElementById('popover');
  const menuBtn  = document.getElementById('menuBtn');
  const today    = new Date();
  let current    = { year: today.getFullYear(), month: today.getMonth() };
  let activeTheme = localStorage.getItem('cal-theme') || 'blue';
  if (activeTheme === 'default') activeTheme = 'blue';
  widget.classList.add(`theme-${activeTheme}`);

  /* ── Popover toggle ── */
  menuBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    popover.classList.toggle('open');
  });

  document.addEventListener('click', () => popover.classList.remove('open'));
  popover.addEventListener('click', (e) => e.stopPropagation());

  // Background toggle
  const _mq = window.matchMedia('(prefers-color-scheme: dark)');
  let _mode = localStorage.getItem('cal-dark') || 'auto';
  if (_mode === 'on') _mode = 'dark';
  if (_mode === 'off') _mode = 'light';
  function _applyDark(m) {
    document.body.classList.toggle('dark', m === 'dark' || (m === 'auto' && _mq.matches));
  }
  function setMode(m) {
    _mode = m; localStorage.setItem('cal-dark', m); _applyDark(m);
    document.getElementById('modeLight').classList.toggle('active', m === 'light');
    document.getElementById('modeDark').classList.toggle('active', m === 'dark');
    document.getElementById('modeAuto').classList.toggle('active', m === 'auto');
  }
  _mq.addEventListener('change', () => { if (_mode === 'auto') _applyDark('auto'); });
  document.getElementById('modeLight').addEventListener('click', () => setMode('light'));
  document.getElementById('modeDark').addEventListener('click', () => setMode('dark'));
  document.getElementById('modeAuto').addEventListener('click', () => setMode('auto'));
  setMode(_mode);

  // Border toggle
  let borderOn = localStorage.getItem('cal-border') !== 'off';
  function setBorder(on) { borderOn = on; localStorage.setItem('cal-border', on ? 'on' : 'off'); document.body.classList.toggle('border-on', on); document.getElementById('borderOff').classList.toggle('active', !on); document.getElementById('borderOn').classList.toggle('active', on); }
  document.getElementById('borderOff').addEventListener('click', () => setBorder(false));
  document.getElementById('borderOn').addEventListener('click', () => setBorder(true));
  setBorder(borderOn);

  /* ── Swatches ── */
  const grid = document.getElementById('swatchGrid');
  THEMES.forEach(t => {
    const dot = document.createElement('div');
    dot.className = 'swatch' + (t.name === activeTheme ? ' active' : '');
    dot.setAttribute('data-theme', t.name);
    dot.style.background = t.color;
    dot.title = t.label;
    dot.addEventListener('click', () => {
      widget.classList.remove(`theme-${activeTheme}`);
      activeTheme = t.name;
      widget.classList.add(`theme-${activeTheme}`);
      localStorage.setItem('cal-theme', activeTheme);
      document.querySelectorAll('.swatch').forEach(s => s.classList.remove('active'));
      dot.classList.add('active');
      popover.classList.remove('open');
    });
    grid.appendChild(dot);
  });

  /* ── Calendar render ── */
  function renderCalendar() {
    const { year, month } = current;
    document.getElementById('monthLabel').textContent = `${MONTHS[month]} ${year}`;

    const dateGrid = document.getElementById('datesGrid');
    dateGrid.innerHTML = '';

    const firstDay     = new Date(year, month, 1).getDay();
    const daysInMonth  = new Date(year, month + 1, 0).getDate();
    const daysInPrev   = new Date(year, month, 0).getDate();

    for (let i = 0; i < firstDay; i++) {
      const cell = document.createElement('div');
      cell.className = 'day-cell other-month';
      cell.textContent = daysInPrev - firstDay + 1 + i;
      dateGrid.appendChild(cell);
    }

    for (let d = 1; d <= daysInMonth; d++) {
      const cell = document.createElement('div');
      const isToday = d === today.getDate() &&
                      month === today.getMonth() &&
                      year === today.getFullYear();
      cell.className = 'day-cell' + (isToday ? ' today' : '');
      cell.textContent = d;
      dateGrid.appendChild(cell);
    }

    const total    = firstDay + daysInMonth;
    const trailing = total % 7 === 0 ? 0 : 7 - (total % 7);
    for (let i = 1; i <= trailing; i++) {
      const cell = document.createElement('div');
      cell.className = 'day-cell other-month';
      cell.textContent = i;
      dateGrid.appendChild(cell);
    }
  }

  document.getElementById('prev').addEventListener('click', () => {
    current.month--;
    if (current.month < 0) { current.month = 11; current.year--; }
    renderCalendar();
  });

  document.getElementById('next').addEventListener('click', () => {
    current.month++;
    if (current.month > 11) { current.month = 0; current.year++; }
    renderCalendar();
  });

  renderCalendar();
</script>
</body>
</html>
